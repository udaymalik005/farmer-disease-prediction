services:
  - type: web
    name: agrosense-ai
    env: python
    buildCommand: pip install -r requirements.txt && python data/generate_dataset.py && python models/train_model.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
